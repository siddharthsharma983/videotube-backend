version: "3.9"

services:
  backend:
    build: .
    container_name: videotube_backend
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
    restart: always

  mongo:
    image: mongo:7
    container_name: videotube_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7
    container_name: videotube_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mongo_data:
